services:
  web:
    build: .
    command: ./bin/rails server -b 0.0.0.0 -p 3000
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/dockerized_tasks_app_development
      REDIS_URL: redis://redis:6379/0
      BUNDLE_WITHOUT: ""
      BUNDLE_DEPLOYMENT: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: bundle exec sidekiq
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:password@postgres:5432/dockerized_tasks_app_development
      REDIS_URL: redis://redis:6379/0
      BUNDLE_WITHOUT: ""
      BUNDLE_DEPLOYMENT: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  css:
    build: .
    command: ./bin/rails tailwindcss:watch
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      BUNDLE_WITHOUT: ""
      BUNDLE_DEPLOYMENT: "0"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
